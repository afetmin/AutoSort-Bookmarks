name: Version bump

# Bumps package.json semver, commits, pushes to default branch, and pushes tag v*.
# Uses PAT so tag push can trigger downstream workflows.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and tag
        run: >
          npm version ${{ inputs.bump }} -m "chore(release): %s"

      - name: Push commit and tags
        run: git push origin "HEAD:${{ github.event.repository.default_branch }}" --follow-tags
