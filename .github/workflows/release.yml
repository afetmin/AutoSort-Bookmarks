name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Resolve tag from push event
        id: resolve_tag_push
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run zip
      - run: npm run zip:firefox

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag_push.outputs.tag }}
          files: |
            .output/autosort-bookmarks-*-chrome.zip
            .output/autosort-bookmarks-*-firefox.zip
          generate_release_notes: true
