name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run zip
      - run: npm run zip:firefox

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/autosort-bookmarks-*-chrome.zip
            .output/autosort-bookmarks-*-firefox.zip
          generate_release_notes: true
